  <style>

    h2 { color: #0078D4; }
    .formulario {
      background-color: white; padding: 20px; margin-bottom: 30px; border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    label { display: block; margin-top: 15px; font-weight: 500; }
    input, select {
      padding: 10px; width: 100%; max-width: 500px; margin-top: 5px;
      border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;
    }
    button {
      padding: 10px 20px; background-color: #0078D4; color: white; border: none;
      border-radius: 5px; margin-top: 20px; cursor: pointer; font-weight: bold;
      transition: background-color 0.3s;
    }
    button:hover { background-color: #005fa3; }
    .print-btn { background-color: #28a745; }
    .print-btn:hover { background-color: #1e7e34; }
    .pagina {
      display: flex; flex-direction: column; justify-content: space-between;
      height: 29.7cm; width: 21cm; page-break-after: always; box-sizing: border-box;
      padding: 1.5cm 1cm; background: white; margin: 0 auto 30px auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.08);
    }
    .etiqueta {
      border: 1px solid #000; display: flex; flex-direction: column;
      font-size: 14px; background: white; min-height: 8.5cm; margin: 0; padding: 0;
    }
    .linha-codigo { text-align: center; font-weight: bold; padding: 8px 0 2px; font-size: 18px; }
    .linha-descricao { text-align: center; font-weight: bold; padding: 2px 0 8px; font-size: 16px; }
    .linha-grande-validade {
      display: flex; flex-direction: row; align-items: stretch;
      min-height: 180px; margin-bottom: 8px;
    }
    .grande-bloco {
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      background: black; color: white; min-width: 200px; width: 200px; border-right: 1px solid black;
      height: 100%; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important;
    }
    .cervejaria-ambev { font-size: 20px; font-weight: bold; padding: 10px 0 0; text-align: center; }
    .grande {
      font-size: 90px; font-weight: bold; flex: 1;
      display: flex; justify-content: center; align-items: center;
    }
    .validade {
      flex: 1; display: flex; flex-direction: column; justify-content: center;
      background: #000; color: #fff; text-align: center;
      -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important;
    }
    .validade span { font-size: 22px; font-weight: bold; }
    .validade b { font-size: 70px; }
    .linha-inferior {
      display: grid; grid-template-columns: repeat(5, 1fr); border-top: 1px solid black;
    }
    .campo { padding: 5px; text-align: center; font-size: 12px; }
    .campo b { font-size: 14px; }
    .extrato-container {
      background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.08);
      margin-bottom: 30px; margin-top: 20px; max-width: 900px;
    }
    .extrato-container h3 { color: #0078D4; font-size: 20px; }
    .extrato-tabela {
      width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 15px;
    }
    .extrato-tabela th, .extrato-tabela td {
      border: 1px solid #ccc; padding: 8px 12px; text-align: center;
    }
    .extrato-tabela th { background: #f3f4f6; color: #0078D4; }
    .delete-btn {
      background-color: #dc3545; color: white; border: none; padding: 4px 8px;
      border-radius: 4px; cursor: pointer;
    }
    @media print {
      .formulario, .print-btn, .extrato-container { display: none; }
      body { background-color: white; margin: 0; padding: 0; }
      .pagina {
        box-shadow: none; margin: 0; page-break-after: always; page-break-inside: avoid;
      }
    }
  </style>

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("codigo").addEventListener("input", () => {
        const codigo = document.getElementById("codigo").value.trim();
        const descricao = baseProdutos[codigo];
        if (descricao) {
          document.getElementById("descricao").value = descricao;
        }
      });
    });

    function parseDataLocal(dataStr) {
      const [ano, mes, dia] = dataStr.split('-').map(Number);
      return new Date(ano, mes - 1, dia);
    }

    function formatarData(data) {
      if (!data) return '';
      return data.toLocaleDateString('pt-BR');
    }

    function calcularBloqueio(validadeStr) {
      const validade = parseDataLocal(validadeStr);
      validade.setDate(validade.getDate() - 30);
      return validade;
    }

    function getHoje() {
      return new Date();
    }

    function criarEtiquetaHTML(info, grupoId) {
      return `
        <div class="etiqueta" data-grupo="${grupoId}">
          <div class="linha-codigo">Código: ${info.codigo}</div>
          <div class="linha-descricao">${info.descricao}</div>
          <div class="linha-grande-validade">
            <div class="grande-bloco">
              <div class="cervejaria-ambev">Cervejaria Ambev</div>
              <div class="grande">${info.numeroMes}</div>
            </div>
            <div class="validade">
              <span>Data de validade</span>
              <b>${info.validade}</b>
            </div>
          </div>
          <div class="linha-inferior">
            <div class="campo"><span>Conferente:</span><b>${info.conferente}</b></div>
            <div class="campo"><span>Data de bloqueio:</span><b>${info.bloqueio}</b></div>
            <div class="campo"><span>Data de Recebimento:</span><b>${info.recebimento}</b></div>
            <div class="campo"><span>Pedido:</span><b>${info.pedido}</b></div>
            <div class="campo"><span>Origem:</span><b>${info.origem}</b></div>
          </div>
        </div>`;
    }

    function adicionarLinhaExtrato(info, grupoId) {
      const tabela = document.getElementById("extratoTabela").getElementsByTagName('tbody')[0];
      const novaLinha = tabela.insertRow();
      novaLinha.setAttribute("data-grupo", grupoId);
      novaLinha.innerHTML = `
        <td>${info.codigo}</td>
        <td>${info.descricao}</td>
        <td>${info.quantidade}</td>
        <td>${info.validade}</td>
        <td><button class="delete-btn" onclick="removerGrupo('${grupoId}')">🗑️</button></td>
      `;
    }

    function removerGrupo(grupoId) {
      document.querySelectorAll(`[data-grupo="${grupoId}"]`).forEach(el => el.remove());
    }

    function adicionarEtiqueta() {
      const codigo = document.getElementById("codigo").value;
      const descricao = document.getElementById("descricao").value;
      const quantidade = parseInt(document.getElementById("quantidade").value) || 1;
      const validadeInput = document.getElementById("validade").value;
      const pedido = document.getElementById("pedido").value;
      const origem = document.getElementById("origem").value;
      const conferente = document.getElementById("conferente").value;

      if (!validadeInput) {
        alert("Informe a data de validade.");
        return;
      }

      const validadeDate = parseDataLocal(validadeInput);
      const bloqueioDate = calcularBloqueio(validadeInput);
      const numeroMes = (bloqueioDate.getMonth() + 1).toString().padStart(2, '0');
      const hoje = getHoje();
      const grupoId = 'grupo-' + Date.now();

      const info = {
        codigo,
        descricao,
        validade: formatarData(validadeDate),
        pedido,
        origem,
        conferente,
        bloqueio: formatarData(bloqueioDate),
        recebimento: formatarData(hoje),
        numeroMes,
        quantidade
      };

      const container = document.getElementById("etiquetas");
      for (let i = 0; i < quantidade; i++) {
        const pagina = document.createElement("div");
        pagina.className = "pagina";
        pagina.setAttribute("data-grupo", grupoId);
        for (let j = 0; j < 3; j++) {
          pagina.innerHTML += criarEtiquetaHTML(info, grupoId);
        }
        container.appendChild(pagina);
      }

      adicionarLinhaExtrato(info, grupoId);
    }
